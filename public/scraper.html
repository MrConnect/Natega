<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سحب نتائج الطلاب</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .scraper-container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 20px;
        }

        .progress-wrapper {
            width: 100%;
            background-color: var(--surface-bg);
            border: 1px solid var(--surface-border);
            border-radius: 8px;
            overflow: hidden;
            margin: 20px 0;
            height: 25px;
            position: relative;
        }

        .progress-bar {
            height: 100%;
            background-color: var(--primary-color);
            width: 0%;
            transition: width 0.3s ease;
        }

        .progress-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 0.85rem;
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
        }

        .logs-box {
            background-color: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--surface-border);
            border-radius: 8px;
            padding: 15px;
            height: 300px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 0.9rem;
            color: #a0aec0;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .log-entry {
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 5px;
        }

        .log-success {
            color: #4ade80;
        }

        .log-error {
            color: #f87171;
        }

        .log-info {
            color: #60a5fa;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--surface-border);
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary-light);
            margin-top: 5px;
        }
    </style>
</head>

<body class="dashboard-bg">
    <nav class="navbar glass-nav">
        <div class="nav-brand">
            <i class="fa-solid fa-database"></i>
            <span>لوحة تحكم استخراج النتائج</span>
        </div>
        <div class="nav-actions">
            <a href="/" class="primary-btn" style="text-decoration: none; padding: 8px 15px; font-size: 0.9rem;">العودة
                للرئيسية</a>
        </div>
    </nav>

    <main class="scraper-container">
        <div class="glass-card">
            <header class="page-header" style="text-align: center; margin-bottom: 2rem;">
                <h2><i class="fa-solid fa-cloud-arrow-down" style="color:var(--primary-color);"></i> ساحب النتائج
                    التلقائي</h2>
                <p>سحب نتائج جميع الطلاب المسجلين بصيغة Excel</p>
            </header>

            <div class="stats-grid">
                <div class="stat-card">
                    <div>إجمالي الحسابات</div>
                    <div class="stat-value" id="statTotal">0</div>
                </div>
                <div class="stat-card">
                    <div>تم السحب</div>
                    <div class="stat-value" id="statSuccess" style="color: #4ade80;">0</div>
                </div>
                <div class="stat-card">
                    <div>فشل/غير متاح</div>
                    <div class="stat-value" id="statFailed" style="color: #f87171;">0</div>
                </div>
            </div>

            <div style="text-align: center; margin-bottom: 20px;">
                <button id="startBtn" class="primary-btn" style="font-size: 1.1rem; padding: 12px 30px;">
                    <i class="fa-solid fa-play"></i>
                    <span>بدء عملية السحب الآن</span>
                </button>
                <div id="downloadContainer"
                    style="display: none; margin-top: 15px; flex-direction: column; gap: 10px; align-items: center;">
                </div>
            </div>

            <div class="progress-wrapper">
                <div class="progress-bar" id="progressBar"></div>
                <div class="progress-text" id="progressText">0% (0 / 0)</div>
            </div>

            <div class="logs-box" id="logsBox">
                <div class="log-entry log-info">> النظام جاهز. اضغط على بدء السحب للانطلاق...</div>
            </div>
        </div>
    </main>

    <script src="scraper_app.js"></script>
</body>

</html>
